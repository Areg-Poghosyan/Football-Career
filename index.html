<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kick3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Base ───────────────────────────────────────────────── */
    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: 'Orbitron', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Three.js canvas — fixed full-screen background ─────── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── Menu sits above the canvas ─────────────────────────── */
    .menu-wrapper {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Menu container ─────────────────────────────────────── */
    .menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* ── Game title ─────────────────────────────────────────── */
    .title {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #ffffff;
      margin-bottom: 48px;
    }

    /* ── Buttons ────────────────────────────────────────────── */
    .btn {
      width: 260px;
      padding: 14px 0;
      background: transparent;
      border: 1px solid #333;
      color: #ffffff;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .btn:hover,
    .btn:focus-visible {
      color: #00ff88;
      border-color: #00ff88;
      background: rgba(0, 255, 136, 0.05);
      outline: none;
    }

    .btn:active {
      background: rgba(0, 255, 136, 0.12);
    }

    /* ── Career screen ──────────────────────────────────────── */
    #career-screen {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      z-index: 2;
      display: none;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
      padding: 2rem 1.5rem 4rem;
    }
    #career-screen.active { display: flex; }

    /* Back button sits top-left */
    .back-btn {
      position: absolute;
      top: 2rem;
      left: 2rem;
      width: auto;
      padding: 10px 24px;
    }

    /* Screen heading */
    .career-title {
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      margin-top: 1rem;
      margin-bottom: 2.5rem;
    }
    /* Green underline accent on the title */
    .career-title span {
      display: block;
      width: 40px;
      height: 3px;
      background: #00ff88;
      margin: 0.6rem auto 0;
    }

    /* Sections container — full-width, max-width capped */
    .career-sections {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 560px;
    }

    /* Individual section card */
    .career-section {
      border: 1px solid #222;
      padding: 1.5rem 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: border-color 0.2s ease;
    }
    .career-section:hover {
      border-color: #333;
    }

    /* Section label */
    .section-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #00ff88;
    }

    /* Section content placeholder */
    .section-content {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: #333;
      text-transform: uppercase;
    }

    /* ── Coming-soon popup ──────────────────────────────────── */
    #popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 10;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #popup-overlay.active { display: flex; }

    #popup {
      background: #111;
      border: 1px solid #00ff88;
      padding: 40px 48px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      min-width: 280px;
    }

    #popup-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #00ff88;
    }

    #popup-body {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: #888;
      text-transform: uppercase;
    }

    #popup-close {
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <!-- Three.js renders into this canvas -->
  <canvas id="bg-canvas"></canvas>

  <!-- Menu overlaid on top of the canvas -->
  <div class="menu-wrapper">
    <nav class="menu" aria-label="Main menu">
      <h1 class="title">Kick3D</h1>

      <button class="btn" onclick="showPopup('Play')">Play</button>
      <button class="btn" onclick="showScreen('career')">Career Mode</button>
      <button class="btn" onclick="showPopup('Settings')">Settings</button>
      <button class="btn" onclick="showPopup('Credits')">Credits</button>
    </nav>
  </div>

  <!-- Career screen: player creation layout -->
  <div id="career-screen">
    <button class="btn back-btn" onclick="showScreen('menu')">← Back</button>

    <h2 class="career-title">Create Your Player<span></span></h2>

    <div class="career-sections">

      <div class="career-section">
        <div class="section-label">Name</div>
        <div class="section-content">—</div>
      </div>

      <div class="career-section">
        <div class="section-label">Position</div>
        <div class="section-content">—</div>
      </div>

      <div class="career-section">
        <div class="section-label">Nationality</div>
        <div class="section-content">—</div>
      </div>

      <div class="career-section">
        <div class="section-label">Club</div>
        <div class="section-content">—</div>
      </div>

    </div>
  </div>

  <!-- Coming-soon popup overlay -->
  <div id="popup-overlay" onclick="closePopup()">
    <div id="popup" onclick="event.stopPropagation()">
      <div id="popup-title"></div>
      <div id="popup-body">Coming soon</div>
      <button class="btn" id="popup-close" onclick="closePopup()">Close</button>
    </div>
  </div>

  <!-- Three.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    /* ── Scene setup ────────────────────────────────────────── */
    const renderer = new THREE.WebGLRenderer({
      canvas: document.getElementById('bg-canvas'),
      antialias: true
    });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x0a0a0a);

    const scene  = new THREE.Scene();
    // Camera angled down to show the pitch in perspective
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 14, 18);
    camera.lookAt(0, 0, 0);

    /* ── Pitch group — everything rotates together ──────────── */
    const pitchGroup = new THREE.Group();
    scene.add(pitchGroup);

    /* ── Pitch surface (green plane) ────────────────────────── */
    const surfaceGeo = new THREE.PlaneGeometry(20, 30);
    const surfaceMat = new THREE.MeshBasicMaterial({ color: 0x1a7a3a });
    const surface    = new THREE.Mesh(surfaceGeo, surfaceMat);
    surface.rotation.x = -Math.PI / 2; // lay flat
    pitchGroup.add(surface);

    /* ── White line helper ──────────────────────────────────── */
    // Draws a thin white rectangle (line) lying flat on the pitch.
    // x, z = centre position; w = width along X; d = depth along Z
    function addLine(x, z, w, d) {
      const geo  = new THREE.PlaneGeometry(w, d);
      const mat  = new THREE.MeshBasicMaterial({ color: 0xffffff });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.x = -Math.PI / 2;
      mesh.position.set(x, 0.01, z); // 0.01 above surface to avoid z-fighting
      pitchGroup.add(mesh);
    }

    const lw = 0.12; // line width (metres equivalent)

    // Outer border
    addLine(0,   0,   20,   lw);   // top edge
    addLine(0,   0,   20,   lw);   // (reused — overridden below with correct positions)

    // Border: top, bottom, left, right
    addLine(0,  -15,  20,   lw);   // top touchline
    addLine(0,   15,  20,   lw);   // bottom touchline
    addLine(-10,  0,  lw,   30);   // left touchline
    addLine( 10,  0,  lw,   30);   // right touchline

    // Halfway line
    addLine(0, 0, 20, lw);

    // Centre circle — approximated with a ring geometry
    const ringGeo = new THREE.RingGeometry(2.5, 2.5 + lw, 48);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
    const ring    = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.01;
    pitchGroup.add(ring);

    // Centre spot
    const spotGeo = new THREE.CircleGeometry(0.18, 16);
    const spotMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const spot    = new THREE.Mesh(spotGeo, spotMat);
    spot.rotation.x = -Math.PI / 2;
    spot.position.y = 0.01;
    pitchGroup.add(spot);

    // Penalty boxes (top and bottom)
    function addBox(zCenter) {
      const bw = 10, bd = 5; // box width, depth
      addLine(0,          zCenter - bd / 2, bw, lw); // far edge
      addLine(0,          zCenter + bd / 2, bw, lw); // near edge
      addLine(-bw / 2,    zCenter,          lw, bd); // left edge
      addLine( bw / 2,    zCenter,          lw, bd); // right edge
    }
    addBox(-12.5); // top penalty box
    addBox( 12.5); // bottom penalty box

    /* ── Resize handler ─────────────────────────────────────── */
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    /* ── Screen navigation ──────────────────────────────────── */
    const menuWrapper   = document.querySelector('.menu-wrapper');
    const careerScreen  = document.getElementById('career-screen');

    function showScreen(name) {
      if (name === 'career') {
        menuWrapper.style.display = 'none';
        careerScreen.classList.add('active');
      } else {
        careerScreen.classList.remove('active');
        menuWrapper.style.display = 'flex';
      }
    }

    /* ── Coming-soon popup ──────────────────────────────────── */
    const popupOverlay = document.getElementById('popup-overlay');
    const popupTitle   = document.getElementById('popup-title');

    function showPopup(label) {
      popupTitle.textContent = label;
      popupOverlay.classList.add('active');
    }

    function closePopup() {
      popupOverlay.classList.remove('active');
    }

    /* ── Animation loop — slow Y-axis rotation ──────────────── */
    function animate() {
      requestAnimationFrame(animate);
      pitchGroup.rotation.y += 0.003; // slow, steady spin
      renderer.render(scene, camera);
    }
    animate();
  </script>

</body>
</html>
